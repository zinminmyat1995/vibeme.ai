  <!-- ── BOTTOM TIP DOT — multicolor ring ── -->
  <circle cx="340" cy="410" r="14" fill="none" stroke="#F59E0B" stroke-width="3" style="fill:none;stroke:rgb(245, 158, 11);color:rgb(255, 255, 255);stroke-width:3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
